---
- hosts: localhost
  vars_files:
    - vars.yml
  tasks:
    - name: setup time
      file:
        state: link
        force: yes
        src: "/usr/share/zoneinfo/{{ timezone }}"
        dest: /etc/localtime
        owner: root
        group: root
        mode: 0644

    - name: setup hosts file
      template:
        src: hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: 0644
      tags:
        - network

    - name: setup resolv.conf file
      template:
        src: resolv.conf.j2
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: 0644
      tags:
        - network

    - name: configure dhcpcd to not assign ipv6 addresses
      lineinfile:
        path: /etc/dhcpcd.conf
        line: "{{ item }}"
      loop:
        - "noipv6rs"
        - "noipv6"
      tags:
        - network

    - name: setup mirrorlist.conf
      template:
        src: mirrorlist.conf.j2
        dest: /etc/pacman.d/mirrorlist
        owner: root
        group: root
        mode: 0644

    - name: setup fontconfig
      template:
        src: fontconfig.j2
        dest: /etc/fonts/local.conf
        owner: root
        group: root
        mode: 0644

    - name: setup fontconfig symlinks
      file:
        state: "{{ item.state }}"
        force: yes
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: 0644
      loop:
        - { src: "/etc/fonts/conf.avail/20-unhint-small-vera.conf",       dest: "/etc/fonts/conf.d/20-unhint-small-vera.conf",       state: "link" }
        - { src: "/etc/fonts/conf.avail/30-metric-aliases.conf",          dest: "/etc/fonts/conf.d/30-metric-aliases.conf",          state: "link" }
        - { src: "/etc/fonts/conf.avail/40-nonlatin.conf",                dest: "/etc/fonts/conf.d/40-nonlatin.conf",                state: "link" }
        - { src: "/etc/fonts/conf.avail/45-generic.conf",                 dest: "/etc/fonts/conf.d/45-generic.conf",                 state: "link" }
        - { src: "/etc/fonts/conf.avail/45-latin.conf",                   dest: "/etc/fonts/conf.d/45-latin.conf",                   state: "link" }
        - { src: "/etc/fonts/conf.avail/49-sansserif.conf",               dest: "/etc/fonts/conf.d/49-sansserif.conf",               state: "link" }
        - { src: "/etc/fonts/conf.avail/50-user.conf",                    dest: "/etc/fonts/conf.d/50-user.conf",                    state: "absent" }
        - { src: "/etc/fonts/conf.avail/51-local.conf",                   dest: "/etc/fonts/conf.d/51-local.conf",                   state: "link" }
        - { src: "/etc/fonts/conf.avail/60-generic.conf",                 dest: "/etc/fonts/conf.d/60-generic.conf",                 state: "link" }
        - { src: "/etc/fonts/conf.avail/60-latin.conf",                   dest: "/etc/fonts/conf.d/60-latin.conf",                   state: "absent" }
        - { src: "/etc/fonts/conf.avail/65-fonts-persian.conf",           dest: "/etc/fonts/conf.d/65-fonts-persian.conf",           state: "link" }
        - { src: "/etc/fonts/conf.avail/65-nonlatin.conf",                dest: "/etc/fonts/conf.d/65-nonlatin.conf",                state: "link" }
        - { src: "/etc/fonts/conf.avail/69-unifont.conf",                 dest: "/etc/fonts/conf.d/69-unifont.conf",                 state: "absent" }
        - { src: "/etc/fonts/conf.avail/69-urw-bookman.conf",             dest: "/etc/fonts/conf.d/69-urw-bookman.conf",             state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-c059.conf",                dest: "/etc/fonts/conf.d/69-urw-c059.conf",                state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-d050000l.conf",            dest: "/etc/fonts/conf.d/69-urw-d050000l.conf",            state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-fallback-backwards.conf",  dest: "/etc/fonts/conf.d/69-urw-fallback-backwards.conf",  state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-fallback-generics.conf",   dest: "/etc/fonts/conf.d/69-urw-fallback-generics.conf",   state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-fallback-specifics.conf",  dest: "/etc/fonts/conf.d/69-urw-fallback-specifics.conf",  state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-gothic.conf",              dest: "/etc/fonts/conf.d/69-urw-gothic.conf",              state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-nimbus-mono-ps.conf",      dest: "/etc/fonts/conf.d/69-urw-nimbus-mono-ps.conf",      state: "absent" }
        - { src: "/etc/fonts/conf.avail/69-urw-nimbus-roman.conf",        dest: "/etc/fonts/conf.d/69-urw-nimbus-roman.conf",        state: "absent" }
        - { src: "/etc/fonts/conf.avail/69-urw-nimbus-sans.conf",         dest: "/etc/fonts/conf.d/69-urw-nimbus-sans.conf",         state: "absent" }
        - { src: "/etc/fonts/conf.avail/69-urw-p052.conf",                dest: "/etc/fonts/conf.d/69-urw-p052.conf",                state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-standard-symbols-ps.conf", dest: "/etc/fonts/conf.d/69-urw-standard-symbols-ps.conf", state: "link" }
        - { src: "/etc/fonts/conf.avail/69-urw-z003.conf",                dest: "/etc/fonts/conf.d/69-urw-z003.conf",                state: "link" }
        - { src: "/etc/fonts/conf.avail/70-no-bitmaps.conf",              dest: "/etc/fonts/conf.d/70-no-bitmaps.conf",              state: "link" }
        - { src: "/etc/fonts/conf.avail/80-delicious.conf",               dest: "/etc/fonts/conf.d/80-delicious.conf",               state: "absent" }
        - { src: "/etc/fonts/conf.avail/90-synthetic.conf",               dest: "/etc/fonts/conf.d/90-synthetic.conf",               state: "link" }

    - name: setup freetype
      template:
        src: freetype2.sh.j2
        dest: /etc/profile.d/freetype2.sh
        owner: root
        group: root
        mode: 0644

    - name: setup font and theme and perform few other tweaks on gnome shell
      become: yes
      become_user: "{{ user }}"
      dconf:
        key: "{{item.key}}"
        value: "{{item.value}}"
        state: present
      loop:
        - {key: '/org/gnome/desktop/interface/gtk-theme', value: "'{{ gtk_theme }}'"}
        - {key: '/org/gnome/desktop/interface/icon-theme', value: "'{{ icon_theme }}'"}
        - {key: '/org/gnome/desktop/interface/clock-show-seconds', value: "true"}
        - {key: '/org/gnome/desktop/interface/clock-show-weekday', value: "true"}
        - {key: '/org/gnome/desktop/interface/font-name', value: "'{{ sans_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/interface/document-font-name', value: "'{{ document_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/interface/monospace-font-name', value: "'{{ monospace_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/wm/preferences/titlebar-font', value: "'{{ legacy_title_font }} {{ font_size }}'"}
        - {key: '/org/gnome/shell/disable-user-extensions', value: "true"}
        - {key: '/org/gnome/mutter/center-new-windows', value: "true"}
