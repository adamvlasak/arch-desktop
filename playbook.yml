---
- name: Setup arch linux desktop
  hosts: localhost
  vars_files:
    - vars.yml
  tasks:
    - name: Install required packages
      community.general.pacman:
        name: "{{ packages }}"
        state: present
      when: packages is defined
      tags:
        - packages

    - name: Setup time
      ansible.builtin.file:
        state: link
        force: true
        src: "/usr/share/zoneinfo/{{ timezone }}"
        dest: /etc/localtime
        owner: root
        group: root
        mode: 0644
      tags:
        - locale

    - name: Setup locale.conf
      ansible.builtin.template:
        src: locale.conf.j2
        dest: /etc/locale.conf
        owner: root
        group: root
        mode: 0644
      notify:
        - Run locale-gen
      tags:
        - locale

    - name: Setup locale.gen
      ansible.builtin.template:
        src: locale.gen.j2
        dest: /etc/locale.gen
        owner: root
        group: root
        mode: 0644
      notify:
        - Run locale-gen
      tags:
        - locale

    - name: Remove desktop icons
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        "{{ absent_desktop_icons }}"
      when: absent_desktop_icons is defined
      tags:
        - gnome

    - name: Ensure critical services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        "{{ critical_services }}"
      when: critical_services is defined
      tags:
        - services

    - name: Mask some user services
      become: true
      become_user: "{{ user }}"
      ansible.builtin.systemd:
        name: "{{ item }}"
        scope: user
        masked: true
      loop:
        "{{ masked_user_services }}"
      when: masked_user_services is defined
      tags:
        - services

    - name: Mask some system services
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
        enabled: false
        state: stopped
      loop:
        "{{ masked_system_services }}"
      when: masked_system_services is defined
      tags:
        - services

    - name: Make user part of important groups
      ansible.builtin.user:
        name: "{{ user }}"
        group: "{{ user }}"
        groups: ["audio", "video", "storage", "optical", "wheel"]
      tags:
        - user

    - name: Prepare vim plug directories
      become: true
      become_user: "{{ user }}"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        recurse: true
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0755
      loop:
        - /home/{{ user }}/.vim/autoload
        - /home/{{ user }}/.vim/plugged
      tags:
        - vim

    - name: Install vim-plug
      become: true
      become_user: "{{ user }}"
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ item }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0644
      when: not ansible_check_mode
      loop:
        - /home/{{ user }}/.vim/autoload/plug.vim
      tags:
        - vim

  handlers:
    - name: Run locale-gen
      ansible.builtin.command: locale-gen
      changed_when: false
