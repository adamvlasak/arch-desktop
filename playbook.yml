---
- hosts: localhost
  vars_files:
    - vars.yml
  tasks:
    - name: setup time
      file:
        state: link
        force: yes
        src: "/usr/share/zoneinfo/{{ timezone }}"
        dest: /etc/localtime
        owner: root
        group: root
        mode: 0644

    - name: setup hosts file
      template:
        src: hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: 0644
      tags:
        - network

    - name: setup resolv.conf file
      template:
        src: resolv.conf.j2
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: 0644
      tags:
        - network

    - name: configure dhcpcd to not assign ipv6 addresses
      lineinfile:
        path: /etc/dhcpcd.conf
        line: "{{ item }}"
      loop:
        - "noipv6rs"
        - "noipv6"
      tags:
        - network

    - name: setup locale.conf
      template:
        src: locale.conf.j2
        dest: /etc/locale.conf
        owner: root
        group: root
        mode: 0644
      notify:
        - run locale-gen

    - name: setup locale.gen
      template:
        src: locale.gen.j2
        dest: /etc/locale.gen
        owner: root
        group: root
        mode: 0644
      notify:
        - run locale-gen

    - name: setup mirrorlist.conf
      template:
        src: mirrorlist.conf.j2
        dest: /etc/pacman.d/mirrorlist
        owner: root
        group: root
        mode: 0644

    - name: setup fontconfig
      template:
        src: fontconfig.j2
        dest: /etc/fonts/local.conf
        owner: root
        group: root
        mode: 0644

    - name: setup fontconfig symlinks
      file:
        state: "{{ item.state }}"
        force: yes
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: 0644
      loop:
        - { src: "/etc/fonts/conf.avail/20-unhint-small-vera.conf", dest: "/etc/fonts/conf.d/20-unhint-small-vera.conf", state: "absent" }
        - { src: "/etc/fonts/conf.avail/30-metric-aliases.conf",    dest: "/etc/fonts/conf.d/30-metric-aliases.conf",    state: "absent" }
        - { src: "/etc/fonts/conf.avail/40-nonlatin.conf",          dest: "/etc/fonts/conf.d/40-nonlatin.conf",          state: "absent" }
        - { src: "/etc/fonts/conf.avail/45-generic.conf",           dest: "/etc/fonts/conf.d/45-generic.conf",           state: "link" }
        - { src: "/etc/fonts/conf.avail/45-latin.conf",             dest: "/etc/fonts/conf.d/45-latin.conf",             state: "absent" }
        - { src: "/etc/fonts/conf.avail/49-sansserif.conf",         dest: "/etc/fonts/conf.d/49-sansserif.conf",         state: "absent" }
        - { src: "/etc/fonts/conf.avail/50-user.conf",              dest: "/etc/fonts/conf.d/50-user.conf",              state: "absent" }
        - { src: "/etc/fonts/conf.avail/51-local.conf",             dest: "/etc/fonts/conf.d/51-local.conf",             state: "link" }
        - { src: "/etc/fonts/conf.avail/60-generic.conf",           dest: "/etc/fonts/conf.d/60-generic.conf",           state: "link" }
        - { src: "/etc/fonts/conf.avail/60-latin.conf",             dest: "/etc/fonts/conf.d/60-latin.conf",             state: "absent" }
        - { src: "/etc/fonts/conf.avail/65-fonts-persian.conf",     dest: "/etc/fonts/conf.d/65-fonts-persian.conf",     state: "absent" }
        - { src: "/etc/fonts/conf.avail/65-nonlatin.conf",          dest: "/etc/fonts/conf.d/65-nonlatin.conf",          state: "absent" }
        - { src: "/etc/fonts/conf.avail/69-unifont.conf",           dest: "/etc/fonts/conf.d/69-unifont.conf",           state: "absent" }
        - { src: "/etc/fonts/conf.avail/70-no-bitmaps.conf",        dest: "/etc/fonts/conf.d/70-no-bitmaps.conf",        state: "link" }
        - { src: "/etc/fonts/conf.avail/80-delicious.conf",         dest: "/etc/fonts/conf.d/80-delicious.conf",         state: "absent" }
        - { src: "/etc/fonts/conf.avail/90-synthetic.conf",         dest: "/etc/fonts/conf.d/90-synthetic.conf",         state: "link" }

    - name: setup freetype
      template:
        src: freetype2.sh.j2
        dest: /etc/profile.d/freetype2.sh
        owner: root
        group: root
        mode: 0644

    - name: setup font and theme and perform few other tweaks on gnome shell
      become: yes
      become_user: "{{ user }}"
      dconf:
        key: "{{item.key}}"
        value: "{{item.value}}"
        state: present
      loop:
        - {key: '/org/gnome/desktop/interface/gtk-theme', value: "'{{ gtk_theme }}'"}
        - {key: '/org/gnome/desktop/interface/icon-theme', value: "'{{ icon_theme }}'"}
        - {key: '/org/gnome/desktop/interface/clock-show-seconds', value: "true"}
        - {key: '/org/gnome/desktop/interface/clock-show-weekday', value: "true"}
        - {key: '/org/gnome/desktop/interface/font-name', value: "'{{ sans_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/interface/document-font-name', value: "'{{ sans_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/interface/monospace-font-name', value: "'{{ monospace_font }} {{ font_size }}'"}
        - {key: '/org/gnome/desktop/wm/preferences/titlebar-font', value: "'{{ sans_font }} {{ font_size }}'"}
        - {key: '/org/gnome/shell/disable-user-extensions', value: "true"}
        - {key: '/org/gnome/mutter/center-new-windows', value: "true"}

  handlers:
    - name: run locale-gen
      command: locale-gen
