---
- name: Ensure critical services are running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    "{{ system_services }}"
  when:
    - system_services is defined
    - system_services is iterable
  tags:
    - services

- name: Mask some system services
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
    enabled: false
    state: stopped
  loop:
    "{{ masked_system_services }}"
  when:
    - masked_system_services is defined
    - masked_system_services is iterable
  tags:
    - services

- name: Ensure user services are running
  become: true
  become_user: "{{ user }}"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop:
    "{{ user_services }}"
  when:
    - user_services is defined
    - user_services is iterable
  tags:
    - services

- name: Mask some user services
  become: true
  become_user: "{{ user }}"
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
    scope: user
  loop:
    "{{ masked_user_services }}"
  when:
    - masked_user_services is defined
    - masked_user_services is iterable
  tags:
    - services
